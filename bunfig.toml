# Bun configuration for Convia monorepo

[install]
# Use exact versions for reproducibility
exact = true
# Isolated linker (pnpm-style): each workspace gets its own node_modules via
# symlinks. Required so Turbopack can resolve `next` locally in each app.
linker = "isolated"

[install.lockfile]
# Save lockfile
save = true

[run]
silent = false
