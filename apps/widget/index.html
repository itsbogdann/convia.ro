<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoopReply Widget Preview</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #f8fafc;
        font-family: system-ui, -apple-system, sans-serif;
        color: #334155;
        min-height: 100vh;
      }

      /* Fake navbar */
      .sk-nav {
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        padding: 0 32px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .sk-nav-left { display: flex; align-items: center; gap: 24px; }
      .sk-nav-logo {
        width: 32px; height: 32px;
        background: #e2e8f0; border-radius: 8px;
      }
      .sk-nav-links { display: flex; gap: 8px; }
      .sk-nav-link {
        width: 64px; height: 12px;
        background: #e2e8f0; border-radius: 6px;
      }
      .sk-nav-right { display: flex; align-items: center; gap: 12px; }
      .sk-nav-btn {
        width: 80px; height: 32px;
        background: #e2e8f0; border-radius: 6px;
      }
      .sk-nav-avatar {
        width: 32px; height: 32px;
        background: #e2e8f0; border-radius: 50%;
      }

      /* Hero section */
      .sk-hero {
        text-align: center;
        padding: 80px 24px 48px;
        max-width: 640px;
        margin: 0 auto;
      }
      .sk-hero-badge {
        display: inline-block;
        padding: 4px 14px;
        background: #eff6ff;
        color: #3b82f6;
        font-size: 12px;
        font-weight: 600;
        border-radius: 100px;
        margin-bottom: 16px;
        letter-spacing: 0.02em;
      }
      .sk-hero h1 {
        font-size: 28px;
        font-weight: 700;
        color: #0f172a;
        line-height: 1.3;
        margin-bottom: 12px;
      }
      .sk-hero p {
        font-size: 15px;
        color: #64748b;
        line-height: 1.6;
      }

      /* Content skeleton grid */
      .sk-content {
        max-width: 960px;
        margin: 0 auto;
        padding: 0 32px 80px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }
      .sk-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 24px;
      }
      .sk-card-img {
        width: 100%;
        height: 120px;
        background: #f1f5f9;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      .sk-card-title {
        width: 70%;
        height: 14px;
        background: #e2e8f0;
        border-radius: 6px;
        margin-bottom: 10px;
      }
      .sk-card-line {
        width: 100%;
        height: 10px;
        background: #f1f5f9;
        border-radius: 6px;
        margin-bottom: 8px;
      }
      .sk-card-line.short { width: 60%; }

      /* Sidebar skeleton */
      .sk-page { display: flex; }
      .sk-sidebar {
        width: 220px;
        background: #fff;
        border-right: 1px solid #e2e8f0;
        min-height: calc(100vh - 56px);
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .sk-sidebar-item {
        height: 12px;
        background: #f1f5f9;
        border-radius: 6px;
      }
      .sk-sidebar-item:nth-child(1) { width: 80%; }
      .sk-sidebar-item:nth-child(2) { width: 65%; }
      .sk-sidebar-item:nth-child(3) { width: 90%; }
      .sk-sidebar-item:nth-child(4) { width: 50%; }
      .sk-sidebar-item:nth-child(5) { width: 75%; }
      .sk-main { flex: 1; }

      @media (max-width: 768px) {
        .sk-sidebar { display: none; }
        .sk-content { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <!-- Fake navbar -->
    <div class="sk-nav">
      <div class="sk-nav-left">
        <div class="sk-nav-logo"></div>
        <div class="sk-nav-links">
          <div class="sk-nav-link"></div>
          <div class="sk-nav-link"></div>
          <div class="sk-nav-link" style="width:48px"></div>
        </div>
      </div>
      <div class="sk-nav-right">
        <div class="sk-nav-btn"></div>
        <div class="sk-nav-avatar"></div>
      </div>
    </div>

    <div class="sk-page">
      <!-- Fake sidebar -->
      <div class="sk-sidebar">
        <div class="sk-sidebar-item"></div>
        <div class="sk-sidebar-item"></div>
        <div class="sk-sidebar-item"></div>
        <div class="sk-sidebar-item"></div>
        <div class="sk-sidebar-item"></div>
      </div>

      <div class="sk-main">
        <div style="padding:64px 24px 40px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px">
          <img src="/logo.svg" alt="LoopReply" width="48" height="48" style="border-radius:10px" />
          <h1 style="font-size:28px;font-weight:700;color:#0f172a">LoopReply Widget Preview</h1>
        </div>

        <!-- Skeleton cards -->
        <div class="sk-content">
          <div class="sk-card">
            <div class="sk-card-img"></div>
            <div class="sk-card-title"></div>
            <div class="sk-card-line"></div>
            <div class="sk-card-line short"></div>
          </div>
          <div class="sk-card">
            <div class="sk-card-img"></div>
            <div class="sk-card-title" style="width:55%"></div>
            <div class="sk-card-line"></div>
            <div class="sk-card-line short"></div>
          </div>
          <div class="sk-card">
            <div class="sk-card-img"></div>
            <div class="sk-card-title" style="width:85%"></div>
            <div class="sk-card-line"></div>
            <div class="sk-card-line short"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
